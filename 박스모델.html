<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>박스모델</title>
  <style>
    .box{
      background-color:orange;
      width:100px;
      height:100px;
      /*바깥쪽 여백*/
      margin-left:50px;
      margin-right:50px;
      margin-top:50px;
      margin-bottom:50px;
      /*축약형*/
      margin:50px;/*상하좌우*/
      margin:50px 50px;/*상하, 좌우*/
      margin:50px 50px 50px;/*상, 좌우, 하*/
      margin:50px 50px 50px 50px;/*상, 우, 하, 좌*/

      /*안쪽여백 : padding(활용방법은 margin과 동일)*/
      padding:50px;

      /*테두리*/
      border-width:25px;
      border-style:solid;
      border-color:red;
      /*축약형*/
      border:25px solid red;
    }
    section{
      border:5px dotted gray;
    }
    section > nav{
      width:200px;
      height:100px;
      background-color:orange;
      text-align: center;/*인라인요소(글자)의 가운데 정렬*/
      margin-left:0;/*이 코드는 사실 쓸 필요는 없다. 왜냐하면 원래 margin-left가 0이기 때문*/
    }
    section > nav:nth-child(3){
      background-color:green;
      margin-left:auto;/*margin-left값을 auto로 설정하면 요소는 오른쪽으로 정렬됩니다*/
    }
    section > nav:nth-child(2){
      background-color:gold;
      margin-left:auto;
      margin-right:auto;
      margin:auto;/*블록요소의 가운데 정렬 방법*/
    }
  </style>
</head>
<body>
  <div class="box">컨텐츠</div>
  <section>
    <nav>가운데</nav>
    <nav></nav>
    <nav></nav>
  </section>
</body>
</html>
