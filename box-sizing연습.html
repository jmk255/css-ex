<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>box-sizing연습</title>
  <style>
    /*box-sizing:border-box = padding과 border가 width와 height값 안쪽으로 설정됨*/
    *{margin:0; padding:0; box-sizing: border-box;}
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }
    .container{
      width:500px;
      margin:auto;/*가운데 정렬*/
    }
    .box{
      width:200px;
      height:150px;
      margin:20px;
      color:#fff;
    }
    .box1{
      background-color:#3498db;
      line-height:150px;
    }
    .box2{
      background-color:#2ecc71;
      padding:10px;
      border:5px solid black;
      line-height:120px;
      /* box-sizing:border-box; */
    }
    .box3{
      background-color:#e74c3c;
      padding:10px;
      border:10px solid black;
      /* box-sizing: border-box; */
    }
    .box3 img{
      width:100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box box1">Box 1</div>
    <div class="box box2">Box 2</div>
    <div class="box box3">
      <img src="https://picsum.photos/300/200" alt="example image">
    </div>
  </div>
</body>
</html>
