<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>박스모델 연습</title>
  <style>
    .box1{
      width:300px;
      height:200px;
      margin:15px;
      padding:20px;
      border:10px solid blue;
      background-color:yellow;
    }
    .box2{
      width:400px;
      height:250px;
      margin-left:30px;
      padding:15px;
      border:20px dotted black;
      background-color:blue;
    }
    .box3{
      width:500px;
      height:300px;
      /* margin-top:100px;
      margin-bottom:100px; */
      margin:100px 0;
      padding:25px;
      border:5px solid red;
      background-color: green;
    }
    .box4{
      width:100%;
      height:200px;
      padding-left:50px;
      border:10px dashed yellow;
      background-color:orange;
      box-sizing: border-box;/*width와 height안쪽으로 border와 padding을 적용*/
    }
  </style>
</head>
<body>
  <div class="box1">box1</div>
  <div class="box2">box2</div>
  <div class="box3">box3</div>
  <div class="box4">box4</div>
</body>
</html>
