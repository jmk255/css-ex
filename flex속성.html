<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex속성</title>
  <style>
    *{margin:0; padding:0;}
    main{
      width:100%;
      height:100vh;/*vh = viewport height : 브라우저의 높이를 %단위로 표현*/
      /*vw = viewport width : 브라우저의 넓이를 %단위로 표현*/
      background-color:lightcyan;
    }
    section{
      border:10px solid blue;
      display:flex;
      flex-direction:row;/*주축 변경(row:가로, column:세로)*/
      flex-wrap:wrap;/*줄바꿈 허용(기본값:nowrap)*/
      justify-content: space-evenly;/*주축정렬*/
    }
    section article{
      width:100px;
      height:100px;
      background-color:aqua;
      border:1px solid black;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <article>1</article>
      <article>2</article>
      <article>3</article>
      <article>4</article>
      <article>5</article>
    </section>
  </main>
</body>
</html>
