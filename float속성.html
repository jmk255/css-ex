<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>float</title>
  <style>
    .parent{
      background-color:#ccc;
    }
    .parent > .child{
      width:200px; height:200px;
      float:left;/*객체를 띄워서 왼쪽에서 오른쪽방향으로 정렬*/
    }
    .ch1{background-color:#fc0;}
    .ch2{background-color:#f60;}
    .ch3{background-color:#f00;}
    .uncle{
      width:200px;
      height:200px;
      background-color:#00f;
      font-size:32px;
      color:#999;
    }
  </style>
</head>
<body>
  <div class="parent">
    <div class="child ch1">글씨를 써볼게요</div>
    <div class="child ch2">글씨를 써볼게요</div>
    <div class="child ch3">글씨를 써볼게요</div>
    <!--클리어픽스핵(float속성을 적용한 자식요소의 높이를 부모요소가 인식시키게 하는 방법)-->
    <div style="clear:both;"></div>
  </div>
  <div class="uncle">삼촌</div>
</body>
</html>
