<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내비게이션연습</title>
  <style>
    *{margin:0; padding:0;}
    ul,li{list-style:none;}
    a{text-decoration: none; color:#fff;}
    body{
      font-family: "맑은 고딕", sans-serif;
    }
    /*클리어픽스핵*/
    .clearfix::after{
      content:"";
      display:block;
      clear:both;
    }
    .navbar{
      width:100%;
      background-color:orangered;
    }
    .navbar > .container{
      width:1080px;
      margin:auto;
      padding:0 10px;
      /* box-sizing: border-box; */
    }
    .logo{float:left;}
    /*img요소의 display속성을 block으로 변경하면 img요소의 여백을 제거할 수 있다*/
    .logo img{display:block;}
    .gnb{float:right;}
    .gnb > li{
      float:left;
      margin-left:60px;
    }
    .gnb > li > a{
      font-size:14px;
      font-weight: bold;
      line-height:40px;
    }
    /*하이라이트 효과*/
    .gnb > li > a:hover{
      color:yellow;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="container clearfix">
      <h1 class="logo"><a href="#">
        <img src="img/img-logo-w.png" alt="logo">
      </a></h1>
      <ul class="gnb">
        <li><a href="#">ABOUT</a></li>
        <li><a href="#">NEWS</a></li>
        <li><a href="#">PORTFOLIO</a></li>
        <li><a href="#">BOARD</a></li>
        <li><a href="#">ALBUM</a></li>
        <li><a href="#">CONTACT</a></li>
      </ul>
    </div>
  </nav>
</body>

</html>
