<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내비게이션연습</title>
  <style>
    *{margin:0; padding:0;}
    ul,li{list-style:none;}
    a{text-decoration: none; color:#fff;}
    body{
      font-family: "맑은 고딕", sans-serif;
    }
    
    .navbar{
      width:100%;
      min-width:1100px;/*최소넓이 설정*/
      background-color:orangered;
    }
    .navbar > .container{
      width:1080px;
      margin:auto;
      padding:0 10px;
      display:flex;/*flex적용*/
      justify-content: space-between;/*주축정렬*/
      align-items: center;/*교차축정렬*/
    }
    .logo img{display:block;}/*이미지 요소의 여백 제거*/
    .gnb{
      display:flex;
      gap:60px;/*items사이의 여백을 설정*/
    }
    .gnb > li > a{
      font-size:14px;
      font-weight: bold;
    }
    /* .gnb > li{ item 사이 여백 설정
      margin-left: 60px;
    } */
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="container clearfix">
      <h1 class="logo"><a href="#">
        <img src="img/img-logo-w.png" alt="logo">
      </a></h1>
      <ul class="gnb">
        <li><a href="#">ABOUT</a></li>
        <li><a href="#">NEWS</a></li>
        <li><a href="#">PORTFOLIO</a></li>
        <li><a href="#">BOARD</a></li>
        <li><a href="#">ALBUM</a></li>
        <li><a href="#">CONTACT</a></li>
      </ul>
    </div>
  </nav>
</body>

</html>
