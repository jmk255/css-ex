<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마우스이벤트</title>
  <style>
    a:link{/*기본 링크값*/
      color:#333;
      text-decoration: none;/*밑줄 제거*/
    }
    a:visited{/*방문한 링크*/
      color:#6c3;
    }
    a:hover{/*a요소에 마우스를 올리면 적용*/
      background-color:hotpink;
      color:#fff;
    }
    a:active{/*a요소를 클랙했을 때 적용*/
      color:#f00;
      background-color:transparent;/*기본값(투명)*/
    }

  </style>
</head>
