<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가운데정렬</title>
  <style>
    /*노말라이즈*/
    *{margin:0; padding:0;}
    body{
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }
    /*===========================*/
    .wrap{
      height:250px;
      background-color:olive;
      color:#fff;
    }
    /*title을 .wrap요소의 가운데로 정렬*/
    h1{
      font-size:40px;
      text-align: center;
      padding-top:101px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>TITLE</h1>
  </div>
</body>
</html>
