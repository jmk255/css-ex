<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <title>vertical-align</title>
  <style>
    .one {
      /*상단 정렬*/
      vertical-align: top;
    }

    .two {
      /*중단 정렬*/
      vertical-align: middle;
    }

    .three {
      /*하단 정렬*/
      vertical-align: bottom;
    }
  </style>
</head>

<body>
  <h1>텍스트와 이미지의 수직 정렬</h1>
  <p>
    <img class="one" src="https://picsum.photos/100" alt="Placeholder Image"> Top text
  </p>
  <p>
    <img class="two" src="https://picsum.photos/100" alt="Placeholder Image"> middle text
  </p>
  <p>
    <img class="three" src="https://picsum.photos/100" alt="Placeholder Image"> bottom text
  </p>
</body>

</html>
