<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>white-space속성</title>
  <style>
    div{
      width:1000px;/*자식입장에서 넓이 만큼만 허용된 공간이 되므로 줄바꿈 됨*/
      font-size:2em;/*em = 배수*/
      border:10px solid red;
      margin:20px auto;
      white-space:nowrap;/*줄바꿈 금지*/
      overflow:auto;/*내용이 넘치면 스크롤바를 제공*/
      overflow:hidden;/*컨텐츠가 넘치면 가려줌*/
      text-overflow:ellipsis;/*글이 넘치면 ...으로 표시*/
    }
  </style>
</head>
<body>
  <div>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Blanditiis omnis similique tempore beatae animi reprehenderit dignissimos quia inventore harum iusto dolorem debitis, accusantium mollitia doloremque quos vitae voluptatem. Voluptates, corporis.</div>
</body>
</html>
